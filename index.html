<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kushagra Mishra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        background: #0d0d0d;
        color: #f0efe9;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        font-family: 'DM Sans', sans-serif;
        font-weight: 300;
        background: #0d0d0d;
        color: #f0efe9;
      }

      body {
        padding: 3rem 2.5rem;
        display: flex;
        justify-content: center;
      }

      main {
        width: 100%;
        max-width: 640px;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        font-size: 0.95rem;
        color: #888;
        margin-bottom: 3rem;
      }

      nav a {
        color: inherit;
        text-decoration: none;
      }

      nav span {
        color: #555;
      }

      .profile {
        display: flex;
        align-items: center;
        gap: 2rem;
        margin-bottom: 3rem;
      }

      .photo {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
        filter: grayscale(20%);
      }

      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .details {
        min-width: 0;
      }

      .name {
        margin: 0 0 0.75rem;
        font-family: 'DM Serif Display', serif;
        font-size: clamp(2.25rem, 4vw, 3rem);
        line-height: 1.05;
      }

      .bio,
      .contact {
        margin: 0;
        color: #888;
        line-height: 1.75;
      }

      .bio a,
      .contact a {
        color: #f0efe9;
        text-decoration: none;
      }

      .bio a:hover,
      .contact a:hover {
        color: #fff;
      }

      footer {
        color: #555;
        font-size: 0.95rem;
      }

      @media (max-width: 520px) {
        body {
          padding: 2rem 1.5rem;
        }

        .profile {
          flex-direction: column;
          align-items: center;
          text-align: center;
        }

        .details {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <a href="#about" target="_blank" rel="noreferrer noopener">About</a>
        <span>/</span>
        <a href="https://mecverse.com" target="_blank" rel="noreferrer noopener">Mecverse</a>
        <span>/</span>
        <a href="https://www.linkedin.com/in/kushagra-mishra-04-/" target="_blank" rel="noreferrer noopener">LinkedIn</a>
      </nav>

      <section class="profile">
        <div class="photo">
          <img src="Photo.png" alt="Kushagra Mishra photo" />
        </div>
        <div class="details">
          <h1 class="name">Kushagra Mishra</h1>
          <p class="bio">Building AI products &amp; operations @ <a href="https://mecverse.com" target="_blank" rel="noreferrer noopener">Mecverse</a></p>
          <p class="contact"><a href="https://www.linkedin.com/in/kushagra-mishra-04-/" target="_blank" rel="noreferrer noopener">Contact via LinkedIn</a></p>
        </div>
      </section>

      <footer>© 2026 Kushagra Mishra</footer>
    </main>
  </body>
</html>
